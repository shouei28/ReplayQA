[pytest]
DJANGO_SETTINGS_MODULE = replayqa.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    -p no:hydra
    -p no:langsmith
testpaths = tests
